<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Creative Hub — Register</title>
  <link rel="stylesheet" href="/css/main.css" />
  <style>
    /* ── Scope picker ── */
    .scope-options { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
    .scope-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      transition: border-color .15s, background .15s;
      user-select: none;
    }
    .scope-card:hover { border-color: var(--primary); }
    .scope-card.selected { border-color: var(--primary); background: var(--primary-light); }
    .scope-check {
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; color: transparent; flex-shrink: 0;
      transition: all .15s;
    }
    .scope-card.selected .scope-check {
      border-color: var(--primary);
      background: var(--primary);
      color: #fff;
    }
    .scope-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .scope-card-name { font-size: 13px; font-weight: 700; color: var(--text); }
    .scope-card-desc { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  </style>
</head>
<body class="auth-page">

  <div class="auth-card" role="main">
    <div class="auth-logo">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none"><circle cx="20" cy="20" r="20" fill="#6366f1"/><path d="M13 20h14M20 13v14" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/></svg>
      <span>Creative Hub</span>
    </div>
    <h1 class="auth-title">Create account</h1>
    <p class="auth-subtitle">Join the creative request platform</p>

    <form id="registerForm" class="auth-form" novalidate>
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" placeholder="Your name" autocomplete="name" required />
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@company.com" autocomplete="email" required />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-with-toggle">
          <input type="password" id="password" name="password" placeholder="Min. 8 characters" autocomplete="new-password" required />
          <button type="button" class="toggle-password" aria-label="Show password" aria-pressed="false" id="togglePwdBtn" onclick="togglePassword()">
            <svg id="eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg id="eye-closed" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none" aria-hidden="true"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
        <span class="field-hint">Use at least 8 characters with a mix of letters and numbers.</span>
      </div>

      <div class="form-group">
        <label for="role">I am a…</label>
        <div class="select-wrapper">
          <select id="role" name="role" class="auth-select" required onchange="onRoleChange(this.value)">
            <option value="requester">Requester — I submit creative requests</option>
            <option value="creative_designer">Creative Designer — I work on tickets</option>
            <option value="creative_lead">Creative Lead — I manage a creative team</option>
          </select>
        </div>
      </div>

      <!-- Shown when creative_designer is selected -->
      <div class="form-group" id="leadPickerGroup" style="display:none">
        <label for="leadId">Your Creative Lead <span class="required">*</span></label>
        <div class="select-wrapper">
          <select id="leadId" name="leadId" class="auth-select">
            <option value="">— Select your Creative Lead —</option>
          </select>
        </div>
      </div>

      <!-- Shown for requester, creative_designer, and creative_lead -->
      <div class="form-group" id="scopeGroup" style="display:none">
        <label>Project Scope <span class="required">*</span></label>
        <span class="field-hint" id="scopeGroupHint"></span>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-top:6px;margin-bottom:4px;flex-wrap:wrap;gap:6px">
          <span id="scopeCounter" style="font-size:12px;color:var(--text-muted);font-weight:500"></span>
          <div style="display:flex;gap:6px">
            <button type="button" class="btn btn-sm btn-ghost" onclick="selectAllScope()">Select all</button>
            <button type="button" class="btn btn-sm btn-ghost" onclick="clearAllScope()">Clear all</button>
          </div>
        </div>
        <div id="scopeOptions" class="scope-options"></div>
      </div>

      <!-- Shown when requester is selected -->
      <div class="form-group" id="superiorEmailGroup" style="display:none">
        <label for="directSuperiorEmail">Direct Superior Email <span class="required">*</span></label>
        <input type="email" id="directSuperiorEmail" name="directSuperiorEmail"
          placeholder="superior@company.com" autocomplete="off" />
        <span class="field-hint">Enter your direct manager's work email address.</span>
      </div>

      <div id="register-error" class="alert alert-error" style="display:none"></div>

      <button type="submit" id="registerBtn" class="btn btn-primary btn-full">
        <span id="registerBtnText">Create Account</span>
        <span id="registerBtnLoader" class="btn-loader" style="display:none"></span>
      </button>
    </form>

    <p class="auth-hint">Already have an account? <a href="/" class="auth-link">Sign in</a></p>
  </div>

  <script>
    const token = localStorage.getItem('crp_token') || sessionStorage.getItem('crp_token');
    if (token) window.location.href = '/dashboard';

    let leadsCache = null;

    const ALL_PROJECTS = [
      { id: 'smxc', name: 'Social Media',       code: 'SMXC', color: '#10b981', group: 'Out App 1' },
      { id: 'daxc', name: 'Digital Ads',         code: 'DAXC', color: '#f59e0b', group: 'Out App 1' },
      { id: 'ebxc', name: 'Existing Buyer',      code: 'EBXC', color: '#6366f1', group: 'In App' },
      { id: 'plxc', name: 'Private Label',       code: 'PLXC', color: '#0ea5e9', group: 'In App' },
      { id: 'ocsp', name: 'Offline Collateral',  code: 'OCSP', color: '#ef4444', group: 'Out App 2' },
      { id: 'pac',  name: 'Packaging',           code: 'PAC',  color: '#8b5cf6', group: 'Out App 2' },
      { id: 'studio',      name: 'Studio',       code: 'STD',  color: '#ec4899', group: 'Production' },
      { id: 'copywriting', name: 'Copywriting',  code: 'CW',   color: '#7c3aed', group: 'Production' }
    ];

    const REQUESTER_PROJECTS = ALL_PROJECTS.filter(p => !['studio','copywriting'].includes(p.id));

    function togglePassword() {
      const input     = document.getElementById('password');
      const btn       = document.getElementById('togglePwdBtn');
      const eyeOpen   = document.getElementById('eye-open');
      const eyeClosed = document.getElementById('eye-closed');
      const isHidden  = input.type === 'password';
      input.type = isHidden ? 'text' : 'password';
      btn.setAttribute('aria-label',  isHidden ? 'Hide password' : 'Show password');
      btn.setAttribute('aria-pressed', isHidden ? 'true' : 'false');
      eyeOpen.style.display   = isHidden ? 'none' : '';
      eyeClosed.style.display = isHidden ? '' : 'none';
    }

    function renderScopeOptions(projects) {
      const el = document.getElementById('scopeOptions');
      el.innerHTML = projects.map(p => `
        <div class="scope-card selected" onclick="toggleScopeCard(this)" data-scope="${p.id}">
          <div class="scope-check">✓</div>
          <span class="scope-dot" style="background:${p.color}"></span>
          <input type="hidden" name="project_scope" value="${p.id}">
          <div>
            <div class="scope-card-name">${p.name} <span style="font-size:10px;color:var(--text-muted)">${p.code}</span></div>
            <div class="scope-card-desc">${p.group}</div>
          </div>
        </div>`).join('');
      updateScopeCounter();
    }

    async function onRoleChange(role) {
      const leadGroup      = document.getElementById('leadPickerGroup');
      const scopeGroupEl   = document.getElementById('scopeGroup');
      const superiorGroup  = document.getElementById('superiorEmailGroup');
      const hint           = document.getElementById('scopeGroupHint');

      leadGroup.style.display     = 'none';
      scopeGroupEl.style.display  = 'none';
      superiorGroup.style.display = 'none';

      if (role === 'requester') {
        hint.textContent = 'Choose the projects you work with. Only tickets from these projects will be visible to you. You can select multiple.';
        renderScopeOptions(REQUESTER_PROJECTS);
        scopeGroupEl.style.display  = 'block';
        superiorGroup.style.display = 'block';
        return;
      }

      if (role === 'creative_lead') {
        hint.textContent = 'Select the project areas your team will be working on. Multiple selection allowed.';
        renderScopeOptions(ALL_PROJECTS);
        scopeGroupEl.style.display = 'block';
        return;
      }

      if (role === 'creative_designer') {
        hint.textContent = 'Select the project areas you\'ll be working on. Multiple selection allowed.';
        renderScopeOptions(ALL_PROJECTS);
        leadGroup.style.display    = 'block';
        scopeGroupEl.style.display = 'block';

        if (leadsCache) return;
        const sel = document.getElementById('leadId');
        sel.innerHTML = '<option value="">— Loading… —</option>';
        try {
          const res  = await fetch('/api/auth/leads');
          const data = await res.json();
          leadsCache = data.data || [];
          sel.innerHTML = '<option value="">— Select your Creative Lead —</option>' +
            leadsCache.map(l => `<option value="${l.id}">${l.name}${l.department ? ' · ' + l.department : ''}</option>`).join('');
        } catch {
          sel.innerHTML = '<option value="">— Failed to load leads —</option>';
        }
      }
    }

    function updateScopeCounter() {
      const counter = document.getElementById('scopeCounter');
      if (!counter) return;
      const total    = document.querySelectorAll('#scopeOptions .scope-card').length;
      const selected = document.querySelectorAll('#scopeOptions .scope-card.selected').length;
      counter.textContent = `${selected} of ${total} selected`;
    }

    function selectAllScope() {
      document.querySelectorAll('#scopeOptions .scope-card').forEach(card => {
        card.classList.add('selected');
        const input = card.querySelector('input[type="hidden"]');
        if (input) input.disabled = false;
      });
      updateScopeCounter();
    }

    function clearAllScope() {
      document.querySelectorAll('#scopeOptions .scope-card').forEach(card => {
        card.classList.remove('selected');
        const input = card.querySelector('input[type="hidden"]');
        if (input) input.disabled = true;
      });
      updateScopeCounter();
    }

    function toggleScopeCard(card) {
      const isSelected = card.classList.toggle('selected');
      const input = card.querySelector('input[type="hidden"]');
      if (input) input.disabled = !isSelected;
      updateScopeCounter();
    }

    function getSelectedProjects() {
      return [...document.querySelectorAll('#scopeOptions .scope-card.selected')]
        .map(card => card.dataset.scope);
    }

    function resetBtn() {
      document.getElementById('registerBtnText').style.display = 'inline';
      document.getElementById('registerBtnLoader').style.display = 'none';
      document.getElementById('registerBtn').disabled = false;
    }

    document.addEventListener('DOMContentLoaded', () => {
      onRoleChange(document.getElementById('role').value);
    });

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name     = document.getElementById('name').value.trim();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const role     = document.getElementById('role').value;
      const leadId   = document.getElementById('leadId').value || undefined;
      const errBox   = document.getElementById('register-error');

      errBox.style.display = 'none';
      document.getElementById('registerBtnText').style.display = 'none';
      document.getElementById('registerBtnLoader').style.display = 'inline-block';
      document.getElementById('registerBtn').disabled = true;

      // Validate project scope (all roles)
      const selectedProjects = getSelectedProjects();
      if (!selectedProjects.length) {
        errBox.textContent = 'Please select at least one project scope.';
        errBox.style.display = 'block';
        resetBtn();
        return;
      }

      // Validate lead for designer
      if (role === 'creative_designer' && !leadId) {
        errBox.textContent = 'Please select your Creative Lead.';
        errBox.style.display = 'block';
        resetBtn();
        return;
      }

      // Validate direct superior email for requester
      const directSuperiorEmail = document.getElementById('directSuperiorEmail')?.value?.trim() || '';
      if (role === 'requester' && !directSuperiorEmail) {
        errBox.textContent = 'Please enter your direct superior\'s email address.';
        errBox.style.display = 'block';
        resetBtn();
        return;
      }

      try {
        const res  = await fetch('/api/auth/register', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({
            name, email, password, role, leadId,
            projects: selectedProjects,
            directSuperiorEmail: directSuperiorEmail || undefined
          })
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.error);

        sessionStorage.setItem('crp_token', data.token);
        sessionStorage.setItem('crp_user', JSON.stringify(data.user));
        window.location.href = '/dashboard';
      } catch (err) {
        errBox.textContent = err.message || 'Registration failed. Please try again.';
        errBox.style.display = 'block';
        resetBtn();
      }
    });
  </script>
</body>
</html>
