<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Creative Hub — Register</title>
  <link rel="stylesheet" href="/css/main.css" />
</head>
<body class="auth-page">

  <div class="auth-card">
    <div class="auth-logo">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none"><circle cx="20" cy="20" r="20" fill="#6366f1"/><path d="M13 20h14M20 13v14" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/></svg>
      <span>Creative Hub</span>
    </div>
    <h1 class="auth-title">Create account</h1>
    <p class="auth-subtitle">Join the creative request platform</p>

    <form id="registerForm" class="auth-form" novalidate>
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" placeholder="Your name" autocomplete="name" required />
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@company.com" autocomplete="email" required />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-with-toggle">
          <input type="password" id="password" name="password" placeholder="Min. 8 characters" autocomplete="new-password" required />
          <button type="button" class="toggle-password" aria-label="Show password" onclick="togglePassword()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <div class="form-group">
        <label for="role">I am a…</label>
        <div class="select-wrapper">
          <select id="role" name="role" class="auth-select" required onchange="onRoleChange(this.value)">
            <option value="requester">Requester — I submit creative requests</option>
            <option value="creative_designer">Creative Designer — I work on tickets</option>
            <option value="creative_lead">Creative Lead — I manage a creative team</option>
          </select>
        </div>
      </div>

      <!-- Shown only when creative_designer is selected -->
      <div class="form-group" id="leadPickerGroup" style="display:none">
        <label for="leadId">Your Creative Lead</label>
        <div class="select-wrapper">
          <select id="leadId" name="leadId" class="auth-select">
            <option value="">— Loading leads… —</option>
          </select>
        </div>
        <span class="field-hint">Your account will be added to this lead's team and inherit their project access.</span>
      </div>

      <div id="register-error" class="alert alert-error" style="display:none"></div>

      <button type="submit" id="registerBtn" class="btn btn-primary btn-full">
        <span id="registerBtnText">Create Account</span>
        <span id="registerBtnLoader" class="btn-loader" style="display:none"></span>
      </button>
    </form>

    <p class="auth-hint">Already have an account? <a href="/" class="auth-link">Sign in</a></p>
  </div>

  <script>
    const token = localStorage.getItem('crp_token') || sessionStorage.getItem('crp_token');
    if (token) window.location.href = '/dashboard';

    let leadsCache = null;

    function togglePassword() {
      const input = document.getElementById('password');
      input.type = input.type === 'password' ? 'text' : 'password';
    }

    async function onRoleChange(role) {
      const group = document.getElementById('leadPickerGroup');
      if (role !== 'creative_designer') { group.style.display = 'none'; return; }
      group.style.display = 'block';

      if (leadsCache) return; // already fetched
      const sel = document.getElementById('leadId');
      sel.innerHTML = '<option value="">— Loading… —</option>';
      try {
        const res  = await fetch('/api/auth/leads');
        const data = await res.json();
        leadsCache = data.data || [];
        sel.innerHTML = '<option value="">— Select your Creative Lead —</option>' +
          leadsCache.map(l => `<option value="${l.id}">${l.name}${l.department ? ' · ' + l.department : ''}</option>`).join('');
      } catch {
        sel.innerHTML = '<option value="">— Failed to load leads —</option>';
      }
    }

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name     = document.getElementById('name').value.trim();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const role     = document.getElementById('role').value;
      const leadId   = document.getElementById('leadId').value || undefined;
      const errBox   = document.getElementById('register-error');

      errBox.style.display = 'none';
      document.getElementById('registerBtnText').style.display = 'none';
      document.getElementById('registerBtnLoader').style.display = 'inline-block';
      document.getElementById('registerBtn').disabled = true;

      try {
        const res  = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password, role, leadId })
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.error);

        sessionStorage.setItem('crp_token', data.token);
        sessionStorage.setItem('crp_user', JSON.stringify(data.user));
        window.location.href = '/dashboard';
      } catch (err) {
        errBox.textContent = err.message || 'Registration failed. Please try again.';
        errBox.style.display = 'block';
        document.getElementById('registerBtnText').style.display = 'inline';
        document.getElementById('registerBtnLoader').style.display = 'none';
        document.getElementById('registerBtn').disabled = false;
      }
    });
  </script>
</body>
</html>
