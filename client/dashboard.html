<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Creative Request Platform — Dashboard</title>
  <link rel="stylesheet" href="/css/main.css" />
</head>
<body class="app-page">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <svg width="28" height="28" viewBox="0 0 40 40" fill="none"><circle cx="20" cy="20" r="20" fill="#6366f1"/><path d="M13 20h14M20 13v14" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/></svg>
      <span class="sidebar-brand">Creative Hub</span>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Projects</div>
      <div id="projectNav" class="project-list">
        <!-- Injected by JS -->
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info" id="userInfo">
        <div class="user-avatar" id="userAvatar">A</div>
        <div class="user-meta">
          <div class="user-name" id="userName">Loading...</div>
          <div class="user-email" id="userEmail"></div>
        </div>
      </div>
      <button class="btn-icon logout-btn" title="Sign out" onclick="logout()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
      </button>
    </div>
  </aside>

  <div class="app-main">
    <header class="top-bar">
      <div class="top-bar-left">
        <h2 class="page-title" id="pageTitle">All Requests</h2>
      </div>
      <div class="top-bar-right">
        <button class="btn btn-primary" id="newRequestBtn" onclick="openNewRequest()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
          New Request
        </button>
      </div>
    </header>

    <div class="content-area">
      <!-- Stats -->
      <div class="stats-grid" id="statsGrid">
        <div class="stat-card"><div class="stat-value" id="statTotal">—</div><div class="stat-label">Total Requests</div></div>
        <div class="stat-card"><div class="stat-value" id="statPending">—</div><div class="stat-label">Pending</div></div>
        <div class="stat-card"><div class="stat-value" id="statInProgress">—</div><div class="stat-label">In Progress</div></div>
        <div class="stat-card"><div class="stat-value" id="statDone">—</div><div class="stat-label">Completed</div></div>
      </div>

      <!-- Filters -->
      <div class="table-toolbar">
        <div class="filter-group">
          <select id="filterProject" class="filter-select" onchange="loadRequests()">
            <option value="">All Projects</option>
          </select>
          <select id="filterStatus" class="filter-select" onchange="loadRequests()">
            <option value="">All Statuses</option>
            <option value="pending">Pending</option>
            <option value="in_progress">In Progress</option>
            <option value="completed">Completed</option>
          </select>
        </div>
      </div>

      <!-- Requests Table -->
      <div class="table-card">
        <table class="data-table" id="requestsTable">
          <thead>
            <tr>
              <th>Title</th>
              <th>Project</th>
              <th>Priority</th>
              <th>Status</th>
              <th>Submitted</th>
              <th>By</th>
            </tr>
          </thead>
          <tbody id="requestsBody">
            <tr><td colspan="6" class="table-loading">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script type="module" src="/js/api.js"></script>
  <script type="module" src="/js/dashboard.js"></script>
</body>
</html>
