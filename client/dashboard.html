<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Creative Hub — Dashboard</title>
  <link rel="stylesheet" href="/css/main.css" />
</head>
<body class="app-page">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <svg width="28" height="28" viewBox="0 0 40 40" fill="none"><circle cx="20" cy="20" r="20" fill="#6366f1"/><path d="M13 20h14M20 13v14" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/></svg>
      <span class="sidebar-brand">Creative Hub</span>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Navigation</div>
      <div id="sidebarNav" class="project-list"></div>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" id="userAvatar">?</div>
        <div class="user-meta">
          <div class="user-name" id="userName">Loading…</div>
          <div class="user-email" id="userRole"></div>
        </div>
      </div>
      <button class="btn-icon logout-btn" title="Sign out" onclick="logout()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
      </button>
    </div>
  </aside>

  <!-- Main -->
  <div class="app-main">
    <header class="top-bar">
      <div class="top-bar-left">
        <h2 class="page-title" id="pageTitle">Dashboard</h2>
        <span class="role-chip" id="roleChip"></span>
      </div>
      <div class="top-bar-right" id="topBarRight"></div>
    </header>

    <div class="content-area" id="contentArea">
      <div class="loading-state">Loading…</div>
    </div>
  </div>

  <!-- Ticket Detail Modal -->
  <div id="ticketModal" class="modal-overlay" style="display:none" onclick="closeModal(event)">
    <div class="modal-card" id="modalCard">
      <button class="modal-close" onclick="closeTicketModal()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <div id="modalContent"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script type="module" src="/js/api.js"></script>
  <script type="module" src="/js/dashboard.js"></script>
</body>
</html>
