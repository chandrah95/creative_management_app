<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Creative Hub — Sign In</title>
  <link rel="stylesheet" href="/css/main.css" />
</head>
<body class="auth-page">

  <div class="auth-card" role="main">
    <div class="auth-logo">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none"><circle cx="20" cy="20" r="20" fill="#6366f1"/><path d="M13 20h14M20 13v14" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/></svg>
      <span>Creative Hub</span>
    </div>
    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-subtitle">Sign in to submit and track creative requests</p>

    <form id="loginForm" class="auth-form" novalidate>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@company.com" autocomplete="email" required />
        <span class="field-error" id="email-error"></span>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-with-toggle">
          <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required />
          <button type="button" class="toggle-password" aria-label="Show password" aria-pressed="false" id="togglePwdBtn" onclick="togglePassword()">
            <!-- Eye open (password hidden) -->
            <svg id="eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <!-- Eye closed (password visible) -->
            <svg id="eye-closed" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none" aria-hidden="true"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
        <span class="field-error" id="password-error"></span>
      </div>

      <div class="auth-row">
        <label class="checkbox-label">
          <input type="checkbox" id="rememberMe" name="rememberMe" />
          <span class="checkbox-custom"></span>
          Stay signed in for 30 days
        </label>
      </div>

      <div id="login-error" class="alert alert-error" style="display:none"></div>

      <button type="submit" id="loginBtn" class="btn btn-primary btn-full">
        <span id="loginBtnText">Sign In</span>
        <span id="loginBtnLoader" class="btn-loader" style="display:none"></span>
      </button>
    </form>

    <p class="auth-hint">New user? <a href="/register" class="auth-link">Create an account</a></p>
  </div>

  <script>
    // Redirect if already logged in
    const token = localStorage.getItem('crp_token') || sessionStorage.getItem('crp_token');
    if (token) window.location.href = '/dashboard';

    function togglePassword() {
      const input    = document.getElementById('password');
      const btn      = document.getElementById('togglePwdBtn');
      const eyeOpen  = document.getElementById('eye-open');
      const eyeClosed = document.getElementById('eye-closed');
      const isHidden = input.type === 'password';
      input.type = isHidden ? 'text' : 'password';
      btn.setAttribute('aria-label', isHidden ? 'Hide password' : 'Show password');
      btn.setAttribute('aria-pressed', isHidden ? 'true' : 'false');
      eyeOpen.style.display  = isHidden ? 'none' : '';
      eyeClosed.style.display = isHidden ? '' : 'none';
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const rememberMe = document.getElementById('rememberMe').checked;
      const errBox = document.getElementById('login-error');

      document.getElementById('loginBtnText').style.display = 'none';
      document.getElementById('loginBtnLoader').style.display = 'inline-block';
      document.getElementById('loginBtn').disabled = true;
      errBox.style.display = 'none';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password, rememberMe })
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.error);

        const storage = rememberMe ? localStorage : sessionStorage;
        storage.setItem('crp_token', data.token);
        storage.setItem('crp_user', JSON.stringify(data.user));
        window.location.href = '/dashboard';
      } catch (err) {
        errBox.textContent = err.message || 'Login failed. Please try again.';
        errBox.style.display = 'block';
        document.getElementById('loginBtnText').style.display = 'inline';
        document.getElementById('loginBtnLoader').style.display = 'none';
        document.getElementById('loginBtn').disabled = false;
      }
    });
  </script>
</body>
</html>
